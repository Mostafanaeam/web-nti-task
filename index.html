<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NTI Tasks</title>

  <!-- TailwindCSS -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --primary-color: #f97316;
      --primary-dark: #ea580c;
      --primary-light: #fb923c;
      --background-light: #fff7ed;
      --text-dark: #1e293b;
      --text-light: #f8fafc;
    }

    body {
      background-color: var(--background-light);
      color: var(--text-dark);
      font-family: 'Segoe UI', sans-serif;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      font-weight: 500;
      transition: all 0.3s ease;
      background-color: var(--primary-color);
      color: var(--text-light);
      text-decoration: none;
    }

    .btn:hover {
      background-color: var(--primary-dark);
      transform: translateY(-2px);
    }

    .card {
      background-color: var(--text-light);
      border-radius: 0.5rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 1rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
    }

    .section-title {
      font-size: 1.875rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 2rem;
      color: var(--text-dark);
    }

    fieldset {
      border: 2px solid var(--primary-color);
      border-radius: 0.5rem;
      margin-bottom: 2rem;
      padding: 1rem;
    }

    legend {
      padding: 0 1rem;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--primary-dark);
    }
  </style>
</head>
<body class="p-6">
  <div class="container mx-auto">
    <h1 class="section-title">Web Designer Tasks Navigator @ NTI ASWAN</h1>

    <!-- HTML Tasks -->
    <fieldset>
      <legend>HTML Tasks</legend>
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mt-4">
        <div class="card"><a href="HTML/TASK 1/task1.html" target="_blank" class="btn w-full justify-center">HTML Task 1</a></div>
        <div class="card"><a href="HTML/TASK 2/task-in-course.html" target="_blank" class="btn w-full justify-center">HTML Task 2</a></div>
        <div class="card"><a href="HTML/TASK 3/task.html" target="_blank" class="btn w-full justify-center">HTML Task 3</a></div>
        <!-- ضيف باقي HTML التاسكات هنا -->
      </div>
    </fieldset>

    <!-- CSS Tasks -->
    <fieldset>
      <legend>CSS Tasks</legend>
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mt-4">
        <div class="card"><a href="CSS/TASK 4/index.html" target="_blank" class="btn w-full justify-center">CSS Task 1</a></div>
        <div class="card"><a href="CSS/TASK 5 AVATAR/index.html" target="_blank" class="btn w-full justify-center">CSS Task 2</a></div>
        <div class="card"><a href="CSS/TASK 6 DASHBOARD/index.html" target="_blank" class="btn w-full justify-center">CSS Task 3</a></div>
        <div class="card"><a href="CSS/TASK 7  DOUNTS/index.html" target="_blank" class="btn w-full justify-center">CSS Task 4</a></div>
        <div class="card"><a href="CSS/Hello There Project/index.html" target="_blank" class="btn w-full justify-center">CSS Task 5</a></div>
        <div class="card"><a href="CSS/Kasper Project/index.html" target="_blank" class="btn w-full justify-center">CSS Task 6</a></div>
        <!-- ضيف باقي CSS التاسكات هنا -->
      </div>
    </fieldset>
  </div>
</body>
</html>
